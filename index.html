<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON RUSH // Cyberpunk Racer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#000}
  canvas{display:block}
  #ui{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;font-family:'Orbitron',monospace}
  #hud{position:absolute;top:0;left:0;width:100%;padding:12px 20px;display:flex;justify-content:space-between;opacity:0;transition:opacity .5s}
  #hud.on{opacity:1}
  .hb{background:rgba(0,0,0,.6);border:1px solid rgba(0,255,255,.3);padding:8px 14px;border-radius:4px;backdrop-filter:blur(6px)}
  .hl{font-size:9px;color:rgba(0,255,255,.6);letter-spacing:3px;text-transform:uppercase;margin-bottom:2px}
  .hv{font-size:22px;font-weight:900;letter-spacing:2px}
  .hv.c{color:#0ff;text-shadow:0 0 15px rgba(0,255,255,.7)}
  .hv.m{color:#f0f;text-shadow:0 0 15px rgba(255,0,255,.7)}
  .hv.y{color:#ff0;text-shadow:0 0 15px rgba(255,255,0,.7)}
  .hv.g{color:#0f0;text-shadow:0 0 15px rgba(0,255,0,.7)}
  #sbar{position:absolute;bottom:22px;left:50%;transform:translateX(-50%);width:260px;height:5px;background:rgba(0,0,0,.6);border:1px solid rgba(0,255,255,.3);border-radius:4px;overflow:hidden}
  #sfill{height:100%;width:0%;border-radius:4px;background:linear-gradient(90deg,#0ff,#f0f);transition:width .1s}
  #slbl{position:absolute;bottom:33px;left:50%;transform:translateX(-50%);font-size:9px;color:rgba(0,255,255,.4);letter-spacing:4px}
  #nbar{position:absolute;bottom:22px;right:22px}
  #nbg{width:14px;height:90px;background:rgba(0,0,0,.6);border:1px solid rgba(255,0,255,.3);border-radius:4px;overflow:hidden;position:relative}
  #nfill{position:absolute;bottom:0;width:100%;height:100%;background:linear-gradient(0deg,#f0f,#ff0);border-radius:4px;transition:height .1s}
  #nlbl{font-size:8px;color:rgba(255,0,255,.5);letter-spacing:2px;text-align:center;margin-top:3px}
  #combo{position:absolute;top:45%;right:30px;font-size:40px;font-weight:900;color:#ff0;text-shadow:0 0 25px rgba(255,255,0,.7);opacity:0;transition:opacity .3s}
  #combo.on{opacity:1}
  #title{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;pointer-events:all;background:radial-gradient(ellipse at center,rgba(10,0,30,.95),rgba(0,0,0,.99) 70%)}
  #title.off{display:none}
  .tt{font-size:68px;font-weight:900;letter-spacing:12px;background:linear-gradient(180deg,#0ff,#f0f);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 30px rgba(0,255,255,.5)) drop-shadow(0 0 60px rgba(255,0,255,.3));animation:tp 2s ease-in-out infinite}
  .ts{font-family:'Rajdhani',sans-serif;font-size:17px;letter-spacing:14px;color:rgba(255,0,255,.7);margin-top:8px}
  .tp{font-family:'Rajdhani',sans-serif;font-size:15px;letter-spacing:6px;color:rgba(0,255,255,.8);margin-top:55px;animation:bk 1.5s ease-in-out infinite}
  .tc{font-family:'Rajdhani',sans-serif;font-size:12px;letter-spacing:3px;color:rgba(255,255,255,.3);margin-top:25px;text-align:center;line-height:2}
  .kb{display:inline-block;padding:2px 8px;border:1px solid rgba(0,255,255,.3);border-radius:3px;color:rgba(0,255,255,.5);margin:0 2px;background:rgba(0,255,255,.05)}
  @keyframes tp{0%,100%{filter:drop-shadow(0 0 30px rgba(0,255,255,.5)) drop-shadow(0 0 60px rgba(255,0,255,.3))}50%{filter:drop-shadow(0 0 50px rgba(0,255,255,.8)) drop-shadow(0 0 80px rgba(255,0,255,.5))}}
  @keyframes bk{0%,100%{opacity:1}50%{opacity:.3}}
  #gameover{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;pointer-events:all;background:radial-gradient(ellipse at center,rgba(30,0,0,.9),rgba(0,0,0,.95) 70%)}
  #gameover.off{display:none}
  .gt{font-size:52px;font-weight:900;letter-spacing:10px;color:#f33;text-shadow:0 0 40px rgba(255,50,50,.8)}
  .gs{margin-top:25px;text-align:center}
  .gi{font-family:'Rajdhani',sans-serif;font-size:18px;color:rgba(255,255,255,.6);margin:6px 0;letter-spacing:3px}
  .gi span{color:#0ff;font-weight:700}
  .gp{font-family:'Rajdhani',sans-serif;font-size:15px;letter-spacing:6px;color:rgba(0,255,255,.8);margin-top:35px;animation:bk 1.5s ease-in-out infinite}
  .gh{font-size:13px;color:#ff0;letter-spacing:4px;margin-top:12px;text-shadow:0 0 15px rgba(255,255,0,.6)}
  #scan{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:50;opacity:.03;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.3) 2px,rgba(0,0,0,.3) 4px)}
  #vig{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:49;background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,.5) 100%)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="scan"></div><div id="vig"></div>
<div id="ui">
  <div id="hud">
    <div class="hb"><div class="hl">Score</div><div class="hv c" id="sc">0</div></div>
    <div class="hb"><div class="hl">Speed</div><div class="hv m" id="sp">0</div></div>
    <div class="hb"><div class="hl">Distance</div><div class="hv g" id="ds">0.0 KM</div></div>
    <div class="hb"><div class="hl">Near Miss</div><div class="hv y" id="nm">x0</div></div>
  </div>
  <div id="slbl">VELOCITY</div><div id="sbar"><div id="sfill"></div></div>
  <div id="nbar"><div id="nbg"><div id="nfill"></div></div><div id="nlbl">N2O</div></div>
  <div id="combo"></div>
</div>
<div id="title">
  <div class="tt">NEON RUSH</div>
  <div class="ts">// Cyberpunk Racer //</div>
  <div class="tp">[ PRESS ENTER OR CLICK TO RACE ]</div>
  <div class="tc">
    <span class="kb">A/D</span> or <span class="kb">&larr; &rarr;</span> STEER &nbsp;
    <span class="kb">W</span> or <span class="kb">&uarr;</span> GAS &nbsp;
    <span class="kb">S</span> or <span class="kb">&darr;</span> BRAKE<br>
    <span class="kb">SHIFT</span> NITRO
  </div>
</div>
<div id="gameover" class="off">
  <div class="gt">WRECKED</div>
  <div class="gs">
    <div class="gi">SCORE <span id="fs">0</span></div>
    <div class="gi">DISTANCE <span id="fd">0</span> KM</div>
    <div class="gi">TOP SPEED <span id="ft">0</span> KPH</div>
    <div class="gi">NEAR MISSES <span id="fn">0</span></div>
  </div>
  <div class="gh off" id="fh">NEW HIGH SCORE!</div>
  <div class="gp">[ PRESS ENTER OR CLICK TO RETRY ]</div>
</div>

<script>
const cv=document.getElementById('c'),cx=cv.getContext('2d');
function resize(){cv.width=innerWidth;cv.height=innerHeight}
addEventListener('resize',resize);resize();

// Audio - minimal, non-annoying
const AC=window.AudioContext||window.webkitAudioContext;
let ac;
function initA(){if(!ac)ac=new AC();if(ac.state==='suspended')ac.resume()}
function ping(f,d,v=.04){
  if(!ac)return;const o=ac.createOscillator(),g=ac.createGain();
  o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(v,ac.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+d);
  o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+d);
}
function sndMiss(){ping(1200,.06,.04)}
function sndCrash(){
  if(!ac)return;const b=ac.createBuffer(1,ac.sampleRate*.25,ac.sampleRate),d=b.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,3);
  const s=ac.createBufferSource();s.buffer=b;const g=ac.createGain();g.gain.value=.12;
  s.connect(g);g.connect(ac.destination);s.start();
}

// ---- GAME CONFIG ----
const ROAD_W=1200;           // road half-width in world units
const SEG_L=250;             // segment z-length
const NUM_SEG=600;           // total segments
const DRAW=180;              // draw distance in segments
const LANES=5;
const FOV=100;               // degrees
const CAM_H=1000;            // camera height
const CAM_D=1/Math.tan(FOV/2*Math.PI/180);

// ---- STATE ----
let mode='title',score=0,dist=0,spd=0,topSpd=0,px=0;
let misses=0,combo=0,comboT=0,nitro=100,nitroOn=false;
let shake=0,flash=0,pos=0,gtime=0,fc=0,spawnT=0;
let hi=+localStorage.getItem('nr_hi')||0;

// ---- ROAD ----
let road=[];
function buildRoad(){
  road=[];
  for(let i=0;i<NUM_SEG;i++) road.push({curve:0,y:0});
  // Pre-bake curves + hills with smooth transitions
  let ci=0;
  function addSec(n,c,h){
    for(let i=0;i<n&&ci<NUM_SEG;i++,ci++){
      const s=Math.sin(i/n*Math.PI);
      road[ci].curve=c*s;
      road[ci].y=h*s;
    }
  }
  addSec(25,0,0);addSec(40,2,25);addSec(35,-3,-15);addSec(20,0,35);
  addSec(50,-4,-10);addSec(30,3,0);addSec(25,0,-30);addSec(45,5,20);
  addSec(30,-1.5,10);addSec(55,-3,25);addSec(40,4,-25);addSec(35,0,15);
  // Fill rest with variety
  while(ci<NUM_SEG){
    const n=8+Math.floor(Math.random()*25);
    const c=(Math.random()-.5)*8;
    const h=(Math.random()-.5)*50;
    addSec(n,c,h);
  }
  // Compute cumulative Y
  let cumY=0;
  for(let i=0;i<NUM_SEG;i++){road[i].worldY=cumY;cumY+=road[i].y;}
}

// ---- TRAFFIC ----
let cars=[];
function spawnCar(){
  const lane=Math.floor(Math.random()*LANES);
  const lx=(lane-(LANES-1)/2)*(ROAD_W*2/LANES);
  const cols=['#f22','#22f','#2f2','#ff2','#f2f','#2ff','#f82'];
  const c=cols[Math.floor(Math.random()*cols.length)];
  const s=.3+Math.random()*.35;
  const segAhead=Math.floor(DRAW*.65);
  const base=Math.floor(pos/SEG_L);
  const z=((base+segAhead)%NUM_SEG)*SEG_L+Math.random()*SEG_L;
  cars.push({x:lx,z,spd:s,col:c,missed:false});
}

// ---- PARTICLES ----
let parts=[];
function emit(x,y,n,col,s=1){
  for(let i=0;i<n;i++) parts.push({x,y,vx:(Math.random()-.5)*350*s,vy:-80-Math.random()*250*s,
    life:.3+Math.random()*.5,ml:.3+Math.random()*.5,col,sz:2+Math.random()*3});
}

// ---- INPUT ----
const K={};
addEventListener('keydown',e=>{K[e.code]=true;
  if(mode==='title'&&(e.code==='Enter'||e.code==='Space'))go();
  else if(mode==='over'&&e.code==='Enter')go();
  e.preventDefault();
});
addEventListener('keyup',e=>{K[e.code]=false});
cv.addEventListener('click',()=>{if(mode==='title'||mode==='over')go()});

// ---- START ----
function go(){
  initA();mode='play';score=0;dist=0;spd=0;topSpd=0;px=0;
  misses=0;combo=0;comboT=0;nitro=100;nitroOn=false;
  shake=0;flash=0;pos=0;gtime=0;spawnT=0;cars=[];parts=[];
  buildRoad();
  document.getElementById('title').classList.add('off');
  document.getElementById('gameover').classList.add('off');
  document.getElementById('hud').classList.add('on');
}
function die(){
  mode='over';sndCrash();shake=20;flash=1;
  const W=cv.width,H=cv.height;
  emit(W/2,H*.7,60,'#f80',2);emit(W/2,H*.7,30,'#ff0',1.5);
  if(score>hi){hi=score;localStorage.setItem('nr_hi',''+score);
    document.getElementById('fh').classList.remove('off');}
  else document.getElementById('fh').classList.add('off');
  document.getElementById('fs').textContent=score.toLocaleString();
  document.getElementById('fd').textContent=(dist/50000).toFixed(1);
  document.getElementById('ft').textContent=Math.floor(topSpd/50);
  document.getElementById('fn').textContent=misses;
  setTimeout(()=>{document.getElementById('gameover').classList.remove('off');
    document.getElementById('hud').classList.remove('on');},500);
}

// ---- UPDATE ----
function update(dt){
  if(mode!=='play')return;
  gtime+=dt;fc++;
  const maxS=15000,nitroS=22000;

  // Steer
  let st=0;
  if(K.ArrowLeft||K.KeyA)st=-1;
  if(K.ArrowRight||K.KeyD)st=1;
  px+=st*5000*dt*(spd/maxS);

  // Curves push player
  const si=Math.floor(pos/SEG_L)%NUM_SEG;
  px-=road[si].curve*(spd/maxS)*2500*dt;

  // Clamp
  if(px<-ROAD_W*1.2)px=-ROAD_W*1.2;
  if(px>ROAD_W*1.2)px=ROAD_W*1.2;

  // Accel
  if(K.ArrowUp||K.KeyW)spd+=maxS*.7*dt;
  else if(K.ArrowDown||K.KeyS)spd-=maxS*1.5*dt;
  else spd-=maxS*.2*dt;

  // Off-road
  if(Math.abs(px)>ROAD_W)spd-=maxS*.6*dt;

  // Nitro
  if((K.ShiftLeft||K.ShiftRight)&&nitro>0&&spd>maxS*.15){
    nitroOn=true;nitro-=28*dt;spd+=maxS*1.5*dt;
    if(nitro<=0){nitro=0;nitroOn=false;}
  }else{nitroOn=false;nitro=Math.min(100,nitro+5*dt);}

  const ms=nitroOn?nitroS:maxS;
  spd=Math.max(0,Math.min(ms,spd));
  if(spd>topSpd)topSpd=spd;

  // Move
  const tl=NUM_SEG*SEG_L;
  pos+=spd*dt;
  if(pos>=tl)pos-=tl;
  dist+=spd*dt;
  score+=Math.floor(spd*dt*.0004);

  // Traffic
  const diff=Math.min(gtime/50,2.5);
  spawnT-=dt;
  if(spawnT<=0){spawnCar();if(Math.random()<.25+diff*.1)spawnCar();spawnT=Math.max(.3,1-diff*.2);}

  const pw=180; // player half-width for collision
  for(let i=cars.length-1;i>=0;i--){
    const c=cars[i];
    c.z+=c.spd*maxS*dt;if(c.z>=tl)c.z-=tl;
    let rz=c.z-pos;if(rz<-tl/2)rz+=tl;if(rz>tl/2)rz-=tl;

    // Near miss
    if(!c.missed&&rz>0&&rz<SEG_L*2){
      const gap=Math.abs(px-c.x);
      if(gap<pw+120&&gap>pw-30){
        c.missed=true;misses++;combo++;comboT=2;
        score+=80*combo;sndMiss();shake=Math.min(shake+2,6);
      }
    }
    // Collision
    if(rz>0&&rz<SEG_L*1.2){
      if(Math.abs(px-c.x)<pw+60){die();return;}
    }
    if(rz<-SEG_L*8)cars.splice(i,1);
  }

  if(comboT>0){comboT-=dt;if(comboT<=0)combo=0;}

  // Particles
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=400*dt;
    p.life-=dt;if(p.life<=0)parts.splice(i,1);
  }
  // Nitro particles
  if(nitroOn&&fc%3===0){
    const pcx=cv.width/2;
    emit(pcx+(Math.random()-.5)*20,cv.height*.83,1,Math.random()>.5?'#f0f':'#0ff',.3);
  }

  shake*=.9;if(shake<.1)shake=0;
  flash*=.9;

  // HUD
  document.getElementById('sc').textContent=score.toLocaleString();
  document.getElementById('sp').textContent=Math.floor(spd/50)+' KPH';
  document.getElementById('ds').textContent=(dist/50000).toFixed(1)+' KM';
  document.getElementById('nm').textContent='x'+misses;
  document.getElementById('sfill').style.width=(spd/nitroS*100)+'%';
  document.getElementById('nfill').style.height=nitro+'%';
  const ce=document.getElementById('combo');
  if(combo>1){ce.textContent=combo+'x';ce.classList.add('on');}else ce.classList.remove('on');
}

// ---- RENDER ----
function render(){
  const W=cv.width,H=cv.height;
  cx.clearRect(0,0,W,H);
  const sx=shake?(Math.random()-.5)*shake*2:0;
  const sy=shake?(Math.random()-.5)*shake*2:0;
  cx.save();cx.translate(sx,sy);

  // Sky
  const sg=cx.createLinearGradient(0,0,0,H*.48);
  sg.addColorStop(0,'#030008');sg.addColorStop(.5,'#0a0020');sg.addColorStop(1,'#1a0040');
  cx.fillStyle=sg;cx.fillRect(0,0,W,H);

  // Stars (deterministic)
  for(let i=0;i<100;i++){
    const x=((i*7919+12345)%10000)/10000*W;
    const y=((i*6271+12345)%10000)/10000*H*.38;
    const b=.2+.5*((Math.sin(fc*.02+i)+1)/2);
    cx.fillStyle=`rgba(180,180,255,${b})`;cx.fillRect(x,y,1.5,1.5);
  }

  // Sun
  const sunY=H*.36,sunR=Math.min(65,W*.055);
  const sug=cx.createRadialGradient(W/2,sunY,0,W/2,sunY,sunR);
  sug.addColorStop(0,'rgba(255,120,255,.65)');sug.addColorStop(.4,'rgba(255,50,200,.35)');
  sug.addColorStop(.7,'rgba(100,0,200,.12)');sug.addColorStop(1,'rgba(0,0,0,0)');
  cx.fillStyle=sug;cx.beginPath();cx.arc(W/2,sunY,sunR,0,Math.PI*2);cx.fill();
  cx.fillStyle='#030008';
  for(let i=1;i<7;i++){const ly=sunY+i*7;ctx.fillRect(W/2-sunR,ly,sunR*2,2.5);}

  // Horizon glow
  const hg=cx.createRadialGradient(W/2,sunY+sunR,0,W/2,sunY+sunR,W*.45);
  hg.addColorStop(0,'rgba(255,0,180,.1)');hg.addColorStop(.5,'rgba(0,200,255,.04)');hg.addColorStop(1,'rgba(0,0,0,0)');
  cx.fillStyle=hg;cx.fillRect(0,0,W,H*.5);

  // ==== ROAD (scanline-based) ====
  const horizonY=H*.43;
  const baseSeg=Math.floor(pos/SEG_L);
  const segPct=(pos%SEG_L)/SEG_L;

  // Fill ground below horizon
  cx.fillStyle='#08001a';
  cx.fillRect(0,horizonY,W,H-horizonY);

  // Project each scanline from bottom to horizon
  let curveAcc=0,yAcc=0;
  const lines=H-horizonY;

  // Pre-compute segment data for visible range
  const segData=[];
  let cAcc=0;
  for(let i=0;i<DRAW;i++){
    const idx=(baseSeg+i)%NUM_SEG;
    const s=road[idx];
    cAcc+=s.curve;
    segData.push({curve:cAcc,y:s.worldY||0,idx});
  }

  // For each screen row from bottom to horizon
  for(let row=0;row<lines;row++){
    const screenY=H-row;
    if(screenY<=horizonY)break;

    // Map screen row to z distance
    const perspective=row/lines;
    if(perspective<.001)continue;
    const z=CAM_H/(perspective);

    // Which segment is this?
    const segFloat=z/SEG_L;
    const segI=Math.floor(segFloat);
    if(segI>=DRAW-1)continue;
    const segF=segFloat-segI;

    // Get curve offset at this depth
    const c0=segData[segI]?segData[segI].curve:0;
    const c1=segData[segI+1]?segData[segI+1].curve:0;
    const curveOffset=(c0+(c1-c0)*segF)*perspective*W*.08;

    // Get hill offset
    const y0=segData[segI]?segData[segI].y:0;
    const y1=segData[segI+1]?segData[segI+1].y:0;
    const hillOffset=(y0+(y1-y0)*segF)*perspective*.015;

    const adjustedY=screenY+hillOffset;
    if(adjustedY<horizonY||adjustedY>H)continue;

    // Road width at this depth
    const roadW=ROAD_W*perspective*W*.0012;
    const centerX=W/2-px*perspective*.7+curveOffset;

    // Segment index for coloring
    const absIdx=(baseSeg+segI)%NUM_SEG;
    const alt=Math.floor(absIdx/3)%2;

    // Ground
    const gc=alt?'#0a0020':'#06001a';
    cx.fillStyle=gc;
    cx.fillRect(0,adjustedY-1,W,2);

    // Rumble strips (road edges)
    const rumbleW=roadW*1.12;
    const rumbleC=alt?'#0ff':'#088';
    cx.fillStyle=rumbleC;
    cx.fillRect(centerX-rumbleW,adjustedY-1,rumbleW*2,2);

    // Road surface
    const rc=alt?'rgba(25,12,50,1)':'rgba(18,8,38,1)';
    cx.fillStyle=rc;
    cx.fillRect(centerX-roadW,adjustedY-1,roadW*2,2);

    // Lane dashes
    if(alt){
      cx.fillStyle='rgba(255,0,255,.2)';
      for(let l=1;l<LANES;l++){
        const lx=centerX-roadW+l*(roadW*2/LANES);
        cx.fillRect(lx-1,adjustedY-1,2,2);
      }
    }

    // Center line
    if(Math.floor(absIdx/2)%2===0){
      cx.fillStyle='rgba(255,255,0,.35)';
      cx.fillRect(centerX-1,adjustedY-1,2,2);
    }

    // Side neon strips
    if(Math.floor(absIdx/5)%2===0){
      cx.fillStyle='rgba(255,0,120,.35)';
      const ns=roadW*1.2;
      cx.fillRect(centerX-ns-2,adjustedY-1,3,2);
      cx.fillRect(centerX+ns,adjustedY-1,3,2);
    }
  }

  // ==== BUILDINGS ====
  // Draw simple building silhouettes along the road edges
  const bldSeed=42;
  for(let i=3;i<DRAW;i+=2){
    if(i>=segData.length)break;
    const perspective2=1/(i*SEG_L/CAM_H+1);
    if(perspective2<.005)continue;
    const screenRow=lines*perspective2;
    const bScreenY=H-screenRow;
    if(bScreenY<horizonY-50||bScreenY>H)continue;

    const cOff=segData[i].curve*perspective2*W*.08;
    const roadWHere=ROAD_W*perspective2*W*.0012;
    const bCenterX=W/2-px*perspective2*.7+cOff;

    // Deterministic building properties per segment
    const hash=((i+bldSeed)*7919)%1000;
    const bh=(40+hash%200)*perspective2*3;
    const bw=(30+hash%80)*perspective2*4;
    if(bh<3||bw<2)continue;

    const hue=(hash*3)%360;

    // Left building
    const lx=bCenterX-roadWHere-bw*.6-hash%30*perspective2*2;
    cx.fillStyle=`hsla(${hue},40%,10%,.8)`;
    cx.fillRect(lx-bw/2,bScreenY-bh,bw,bh);
    // Windows
    if(bw>4&&bh>6){
      const wc=Math.max(1,Math.floor(bw/4));
      const wr=Math.max(1,Math.floor(bh/5));
      for(let r=0;r<wr;r++)for(let c=0;c<wc;c++){
        if((r*7+c*13+hash)%3)continue;
        cx.fillStyle=`hsla(${(hue+180)%360},100%,60%,.2)`;
        cx.fillRect(lx-bw/2+c*bw/wc+1,bScreenY-bh+r*bh/wr+1,bw/wc-2,bh/wr-2);
      }
    }

    // Right building
    const hash2=((i+bldSeed+37)*6271)%1000;
    const bh2=(40+hash2%200)*perspective2*3;
    const bw2=(30+hash2%80)*perspective2*4;
    const hue2=(hash2*3)%360;
    const rx=bCenterX+roadWHere+bw2*.6+hash2%30*perspective2*2;
    if(bh2>2&&bw2>2){
      cx.fillStyle=`hsla(${hue2},40%,10%,.8)`;
      cx.fillRect(rx-bw2/2,bScreenY-bh2,bw2,bh2);
      if(bw2>4&&bh2>6){
        const wc2=Math.max(1,Math.floor(bw2/4));
        const wr2=Math.max(1,Math.floor(bh2/5));
        for(let r=0;r<wr2;r++)for(let c=0;c<wc2;c++){
          if((r*11+c*17+hash2)%3)continue;
          cx.fillStyle=`hsla(${(hue2+180)%360},100%,60%,.2)`;
          cx.fillRect(rx-bw2/2+c*bw2/wc2+1,bScreenY-bh2+r*bh2/wr2+1,bw2/wc2-2,bh2/wr2-2);
        }
      }
    }
  }

  // ==== TRAFFIC CARS ====
  if(mode==='play'||mode==='over'){
    const tl=NUM_SEG*SEG_L;
    const sorted=cars.slice().sort((a,b)=>{
      let az=a.z-pos,bz=b.z-pos;
      if(az<0)az+=tl;if(bz<0)bz+=tl;return bz-az;
    });
    for(const car of sorted){
      let rz=car.z-pos;if(rz<0)rz+=tl;
      if(rz>SEG_L*DRAW*.7||rz<SEG_L)continue;

      const segI2=Math.floor(rz/SEG_L);
      if(segI2>=DRAW-1)continue;
      const persp=1/(rz/CAM_H+1);
      if(persp<.005)continue;

      const screenRow2=lines*persp;
      const carY=H-screenRow2;
      if(carY<horizonY||carY>H)continue;

      const cOff2=segData[segI2]?segData[segI2].curve*persp*W*.08:0;
      const carScreenX=W/2+(car.x-px)*persp*.7+cOff2;
      const cw=120*persp;
      const ch=cw*1.7;
      if(cw<2)continue;

      // Shadow
      cx.fillStyle='rgba(0,0,0,.4)';
      cx.fillRect(carScreenX-cw*.6,carY-2,cw*1.2,3);

      // Body
      const cg=cx.createLinearGradient(0,carY-ch,0,carY);
      cg.addColorStop(0,car.col);cg.addColorStop(1,'#111');
      cx.fillStyle=cg;
      cx.fillRect(carScreenX-cw/2,carY-ch,cw,ch);

      // Windshield
      cx.fillStyle='rgba(0,200,255,.2)';
      cx.fillRect(carScreenX-cw*.3,carY-ch*.85,cw*.6,ch*.2);

      // Taillights
      cx.fillStyle=car.col;cx.shadowColor=car.col;cx.shadowBlur=6;
      cx.fillRect(carScreenX-cw/2+1,carY-3,cw*.12,2);
      cx.fillRect(carScreenX+cw/2-cw*.12-1,carY-3,cw*.12,2);
      cx.shadowBlur=0;
    }
  }

  // ==== PLAYER CAR ====
  if(mode==='play'){
    const pcx=W/2,pcy=H*.83,pw=50,ph=88;
    const st=(K.ArrowLeft||K.KeyA)?-1:(K.ArrowRight||K.KeyD)?1:0;
    cx.save();cx.translate(pcx,pcy);cx.rotate(st*-.04);

    // Underglow
    const ug=cx.createRadialGradient(0,ph*.4,4,0,ph*.4,pw*1.1);
    ug.addColorStop(0,nitroOn?'rgba(255,0,255,.35)':'rgba(0,255,255,.25)');
    ug.addColorStop(1,'rgba(0,0,0,0)');
    cx.fillStyle=ug;cx.fillRect(-pw*1.1,ph*.2,pw*2.2,ph*.5);

    // Shadow
    cx.fillStyle='rgba(0,0,0,.3)';
    cx.beginPath();cx.ellipse(0,ph*.44,pw*.6,5,0,0,Math.PI*2);cx.fill();

    // Body
    const bg=cx.createLinearGradient(0,-ph*.5,0,ph*.4);
    bg.addColorStop(0,'#1a1a2e');bg.addColorStop(.4,'#16213e');bg.addColorStop(.7,'#0f3460');bg.addColorStop(1,'#0a0a15');
    cx.fillStyle=bg;
    cx.beginPath();
    cx.moveTo(-pw*.26,-ph*.5);cx.lineTo(pw*.26,-ph*.5);
    cx.lineTo(pw*.46,-ph*.1);cx.lineTo(pw*.4,ph*.4);
    cx.lineTo(-pw*.4,ph*.4);cx.lineTo(-pw*.46,-ph*.1);
    cx.closePath();cx.fill();

    // Windshield
    cx.fillStyle='rgba(0,200,255,.18)';
    cx.beginPath();cx.moveTo(-pw*.2,-ph*.4);cx.lineTo(pw*.2,-ph*.4);
    cx.lineTo(pw*.3,-ph*.1);cx.lineTo(-pw*.3,-ph*.1);cx.closePath();cx.fill();

    // Side neon
    cx.strokeStyle=nitroOn?'rgba(255,0,255,.85)':'rgba(0,255,255,.55)';
    cx.lineWidth=2;cx.shadowColor=nitroOn?'#f0f':'#0ff';cx.shadowBlur=8;
    cx.beginPath();cx.moveTo(-pw*.44,-ph*.08);cx.lineTo(-pw*.38,ph*.37);cx.stroke();
    cx.beginPath();cx.moveTo(pw*.44,-ph*.08);cx.lineTo(pw*.38,ph*.37);cx.stroke();

    // Headlights
    cx.fillStyle='#fff';cx.shadowColor='#0ff';cx.shadowBlur=10;
    cx.fillRect(-pw*.2,-ph*.5,4,2);cx.fillRect(pw*.2-4,-ph*.5,4,2);

    // Taillights
    cx.fillStyle=nitroOn?'#f0f':'#f33';cx.shadowColor=nitroOn?'#f0f':'#f00';cx.shadowBlur=12;
    cx.fillRect(-pw*.34,ph*.33,9,3);cx.fillRect(pw*.34-9,ph*.33,9,3);

    // Nitro flames
    if(nitroOn){
      const fh=10+Math.random()*20;
      const fg=cx.createLinearGradient(0,ph*.4,0,ph*.4+fh);
      fg.addColorStop(0,'rgba(255,100,255,.75)');fg.addColorStop(.5,'rgba(0,150,255,.35)');fg.addColorStop(1,'rgba(0,0,0,0)');
      cx.fillStyle=fg;cx.shadowBlur=0;
      cx.beginPath();cx.moveTo(-9,ph*.4);cx.lineTo(-2+Math.random()*3,ph*.4+fh);cx.lineTo(2,ph*.4);cx.fill();
      cx.beginPath();cx.moveTo(-2,ph*.4);cx.lineTo(4+Math.random()*3,ph*.4+fh*.8);cx.lineTo(9,ph*.4);cx.fill();
    }
    cx.shadowBlur=0;cx.restore();

    // Headlight beam
    cx.save();cx.globalAlpha=.035;cx.fillStyle='#0ff';
    cx.beginPath();cx.moveTo(pcx-16,pcy-45);cx.lineTo(pcx-60,pcy-250);
    cx.lineTo(pcx+60,pcy-250);cx.lineTo(pcx+16,pcy-45);cx.fill();cx.restore();
  }

  // Particles
  for(const p of parts){
    cx.globalAlpha=p.life/p.ml;cx.fillStyle=p.col;cx.shadowColor=p.col;cx.shadowBlur=5;
    cx.fillRect(p.x-p.sz/2,p.y-p.sz/2,p.sz,p.sz);
  }
  cx.globalAlpha=1;cx.shadowBlur=0;

  // Speed lines
  if(mode==='play'&&spd>8000){
    const a=Math.min(.2,(spd-8000)/15000);
    cx.strokeStyle=`rgba(0,255,255,${a})`;cx.lineWidth=1;
    for(let i=0;i<8;i++){
      const lx=Math.random()*W,ly=H*.3+Math.random()*H*.45,len=10+spd/500;
      cx.beginPath();cx.moveTo(lx,ly);cx.lineTo(lx+(lx>W/2?1:-1)*len*.3,ly+len);cx.stroke();
    }
  }

  // Nitro glow
  if(nitroOn){
    const ng=cx.createRadialGradient(W/2,H,0,W/2,H,H);
    ng.addColorStop(0,'rgba(255,0,255,.06)');ng.addColorStop(1,'rgba(0,0,0,0)');
    cx.fillStyle=ng;cx.fillRect(0,0,W,H);
  }

  // Flash
  if(flash>.01){cx.fillStyle=`rgba(255,200,100,${flash*.3})`;cx.fillRect(0,0,W,H);}

  cx.restore();
}

// ---- LOOP ----
let lt=0;
function loop(t){
  const dt=Math.min((t-lt)/1000,.05);lt=t;
  update(dt);render();
  requestAnimationFrame(loop);
}
buildRoad();
requestAnimationFrame(loop);
</script>
</body>
